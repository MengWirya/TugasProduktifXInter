<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productive Lesson 03</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <h2>Activity 01</h2>
    <button id="Alert">Press me to Alert</button>

    <h2>Activity 02</h2>
    <input type="number" id="lenght" placeholder="Enter the lenght">
    <input type="number" id="width" placeholder="Enter the width">
    <button id="CheckArea">Check Area</button>
    <p id="AreaResult"></p>

    <h2>Activity 03</h2>
    <div id="DivBox" class="DivBox"></div>
    <input type="number" id="DivLenght" placeholder="Enter the lenght">
    <input type="number" id="DivWidth" placeholder="Enter the width">
    <input type="color" id="color"> 
    <button id="ChangeDiv">Change the Div</button>

    <h2>Activity 04</h2>
    <label>Choose a colour:</label>
    <select name="colour" id="colour">
        <option value="rgba(255,0,0,0.75)">Red</option>
        <option value="rgba(0,128,0,0.75)">Green</option>
        <option value="rgba(0,0,255,0.75)">Blue</option>
    </select>
    <input type="url" id="GIF_URL" placeholder="Enter the Gif url">
    <button id="ModernAlert">Press me to Alert</button> 

    <h2>Activity 05</h2>
    <input type="text" id="TeacherName" placeholder="Enter the teacher name">
    <input type="text" id="Subject" placeholder="Enter the teacher subject">        
    <input type="number" id="Salary" placeholder="Enter their salary">
    <button id="AddData">Add teacher data</button>
    <li></li>
    <table border="1">
        <thead>
        <tr>
            <th>Name</th>
            <th>Subject</th>
            <th>Salary</th>
        </tr>
        </thead>
        <tbody id="TeacherTable"></tbody>
    </table>

</body>
<script src="script.js"></script>
</html>
